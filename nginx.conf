worker_processes auto;
worker_rlimit_nofile 655350;

events {
    worker_connections 655350;
    multi_accept on;
    use epoll;
}

http {
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 7200;
    keepalive_requests 1000000;
    client_max_body_size 0;

    proxy_connect_timeout 300;
    proxy_send_timeout 86400;
    proxy_read_timeout 86400;
    proxy_buffer_size 128k;
    proxy_buffers 4 256k;
    proxy_busy_buffers_size 256k;
    proxy_request_buffering off;
    proxy_http_version 1.1;

    server_tokens off;
    gzip on;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript;

    server {
        # KEY FIX: Gamita ${PORT} dili 8080 para mu-match sa Cloud Run
        listen ${PORT};
        listen [::]:${PORT};
        http2 on;

        # Healthcheck para dili mag timeout si Cloud Run
        location /health {
            return 200 'OK';
            add_header Content-Type text/plain;
        }

        location / {
            proxy_pass https://www.wikipedia.com;
            proxy_set_header Host www.wikipedia.com;
            proxy_ssl_server_name on;
            proxy_ssl_protocols TLSv1.2 TLSv1.3;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /JonathanTrWS {
            proxy_pass http://127.0.0.1:10001;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_read_timeout 86400;
        }

        location /JonathanVlWS {
            proxy_pass http://127.0.0.1:10002;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_read_timeout 86400;
        }

        location /JonathanVmWS {
            proxy_pass http://127.0.0.1:10003;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_read_timeout 86400;
        }

        location /JonathanSsWS {
            proxy_pass http://127.0.0.1:10004;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_read_timeout 86400;
        }

        location /JonathanTrHU {
            proxy_pass http://127.0.0.1:11001;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_read_timeout 86400;
        }

        location /JonathanVlHU {
            proxy_pass http://127.0.0.1:11002;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
